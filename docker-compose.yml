version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: wts-backend-redis
    ports:
      - "6379:6379"
    networks:
      - wts-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  wts-backend:
    image: wts-backend:latest
    container_name: wts-backend-container
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9789:9789"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3546/stockdb
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      # Redis 설정 (Spring Boot 3.x)
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_TIMEOUT=5000ms
      # Python 서버 설정 (호스트에서 실행)
      - EXTERNAL_PYTHON_SERVER_BASE_URL=${EXTERNAL_PYTHON_SERVER_BASE_URL:-http://wts-python-app:19789}
      - EXTERNAL_PYTHON_SERVER_PY32_URL=${EXTERNAL_PYTHON_SERVER_PY32_URL:-http://host.docker.internal:19987}
      - EXTERNAL_PYTHON_SERVER_TIMEOUT=${EXTERNAL_PYTHON_SERVER_TIMEOUT:-30}
      - EXTERNAL_PYTHON_SERVER_MAX_RETRY=${EXTERNAL_PYTHON_SERVER_MAX_RETRY:-3}
      # Google OAuth2 설정 (.env 파일에서 로드)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-PLEASE-SET-ENVIRONMENT-VARIABLE}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-PLEASE-SET-ENVIRONMENT-VARIABLE}
      # Kiwoom 암호화 설정 (.env 파일에서 로드)
      - KIWOOM_ENCRYPTION_SECRET=${KIWOOM_ENCRYPTION_SECRET:-PLEASE-SET-ENVIRONMENT-VARIABLE}
      - KIWOOM_ENCRYPTION_SALT=${KIWOOM_ENCRYPTION_SALT:-PLEASE-SET-ENVIRONMENT-VARIABLE}
    networks:
      - wts-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
networks:
  wts-network:
    external: true
    name: wts-backend_wts-network # 파이썬서버의 네트워크 이름. inspect에서 확인.
#    driver: bridge #driver: bridge 제거: external 네트워크는 driver 지정 불필요