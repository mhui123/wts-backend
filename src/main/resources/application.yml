server:
  port: 9789

check-dev:
  isdev: true

adapter:
  base-url: http://localhost:8000

quotes:
  codes: ""  # 예: 005930,000660

spring:
  main:
    banner-mode: console
  datasource:
    url: jdbc:h2:mem:wts;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    org.springframework.web: INFO

# Kiwoom REST API 프루빙 설정
kiwoom:
  base.dev-url: https://mockapi.kiwoom.com
  base.url: https://api.kiwoom.com
  probe:
    path: /api/dostk/acnt  # 부작용 없는 엔드포인트로 교체 가능

# 내부 JWT 설정 (실환경에서는 비밀을 안전하게 관리하세요)
app:
  jwt:
    secret: change-me-please-change-this-to-a-secure-random-value
    exp-ms: 3600000
