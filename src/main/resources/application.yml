server:
  port: 9789

check-dev:
  isdev: true

adapter:
  base-url: http://localhost:8000

quotes:
  codes: ""  # 예: 005930,000660

spring:
  main:
    banner-mode: console
  datasource:
#    url: jdbc:h2:mem:wts;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
#    driver-class-name: org.h2.Driver
#    username: sa
#    password:
    url: jdbc:mysql://localhost:3546/stockdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  h2:
    console:
      enabled: true
      path: /h2-console

  # --- Google OAuth2 client 등록 샘플 ---
  # 실제로는 Google Cloud Console에서 OAuth 2.0 클라이언트 ID를 생성하고
  # CLIENT_ID/CLIENT_SECRET을 환경변수로 설정하세요.
  # Redirect URI 예시: http://localhost:9789/login/oauth2/code/google
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 1040121320033-hr7lrmoliq2cjratu6kjgdjdskh4fcf3.apps.googleusercontent.com
            client-secret: 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
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

logging:
  level:
    root: INFO
    org.springframework.web: INFO

# Kiwoom REST API 프루빙 설정
kiwoom:
  base.dev-url: https://mockapi.kiwoom.com
  base.url: https://api.kiwoom.com
  probe:
    path: /api/dostk/acnt  # 부작용 없는 엔드포인트로 교체 가능

# 내부 JWT 설정 (실환경에서는 비밀을 안전하게 관리하세요)
app:
  jwt:
    secret: change-me-please-change-this-to-a-secure-random-value
    exp-ms: 3600000
