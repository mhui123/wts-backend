server:
  port: 9789

check-dev:
  isdev: true

adapter:
  base-url: http://localhost:8000

quotes:
  codes: ""

spring:
  application:
    name: wts-backend
  profiles:
    active: dev

  main:
    banner-mode: console
  datasource:
    url: jdbc:mysql://localhost:3546/stockdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
      format_sql: true
      show-sql: true
    open-in-view: false
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms



  # --- Google OAuth2 client 등록 샘플 ---
  # 실제로는 Google Cloud Console에서 OAuth 2.0 클라이언트 ID를 생성하고
  # CLIENT_ID/CLIENT_SECRET을 환경변수로 설정하세요.
  # Redirect URI 예시: http://localhost:9789/login/oauth2/code/google
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:PLEASE-SET-ENVIRONMENT-VARIABLE}
            client-secret: ${GOOGLE_CLIENT_SECRET:PLEASE-SET-ENVIRONMENT-VARIABLE}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
  web:
    resources:
      static-locations: classpath:/static/
      chain:
        strategy:
          content:
            enabled: true
  mvc:
    static-path-pattern: /**

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    com.wts.auth.security.JwtAuthenticationFilter: DEBUG

# Kiwoom REST API 프루빙 설정
kiwoom:
  encryption:
    secret: ${KIWOOM_ENCRYPTION_SECRET:PLEASE-SET-ENVIRONMENT-VARIABLE}
    salt: ${KIWOOM_ENCRYPTION_SALT:PLEASE-SET-ENVIRONMENT-VARIABLE}
  base.dev-url: https://mockapi.kiwoom.com
  base.url: https://api.kiwoom.com
  timeout: 30000
  probe:
    path: /api/dostk/acnt

# 내부 JWT 설정 (실환경에서는 비밀을 안전하게 관리하세요)
app:
  jwt:
    secret: change-me-please-change-this-to-a-secure-random-value
    exp-ms: 3600000
  frontend:
    success-url: http://localhost:9789

external:
  python-server:
    base-url: http://localhost:19789
    py32-url: http://localhost:19987
    timeout: 30  # 타임아웃 (초)
    max-retry: 3  # 최대 재시도 횟수

# Redis 채널 설정
redis:
  channels:
    quotes: "quotes_channel"  # 실시간 시세 채널
    trades: "trades_channel"  # 거래 데이터 채널
---
# 개발 환경 설정 (수정됨)
spring:
  config:
    activate:
      on-profile: dev

app:
  frontend:
    success-url: http://localhost:9789  # 5173에서 9789로 변경 (백엔드에서 정적 파일 직접 서빙)

# dev 환경에서만 적용할 특별한 설정이 있다면 여기에 추가
# 현재는 기본 설정을 그대로 사용하므로 빈 섹션으로 둘 수 있음
---
# 운영 환경 설정
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://production-host:3306/stockdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      show-sql: false
      format_sql: false

check-dev:
  isdev: false

app:
  frontend:
    success-url: http://localhost:9789

adapter:
  base-url: http://localhost:8000

logging:
  level:
    root: WARN
    com.wts: INFO
